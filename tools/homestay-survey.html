<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>외국인 도시 민박업 현황</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/region-codes.js"></script>
  <script src="../js/business-status-codes.js"></script>
  <style>
    /* ── FILTER SECTION ── */
    .filter-section { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r12); padding: 20px; margin-bottom: 20px; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .filter-date-range { grid-column: 3 / 5; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-group select, .filter-group input { padding: 10px; border: 1px solid var(--b2); border-radius: var(--r4); font-size: 13px; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--ac); outline: none; box-shadow: 0 0 0 3px var(--acg); }
    .filter-date-range { display: flex; gap: 8px; align-items: flex-end; grid-column: 3 / 5; }
    .filter-date-range .filter-group { flex: 1; }
    .filter-date-range span { color: var(--t3); font-weight: 600; padding-bottom: 9px; }

    .button-group { display: flex; gap: 8px; margin-top: 16px; }
    .btn-search { flex: 1; padding: 12px; background: linear-gradient(135deg, var(--ac), var(--ac2)); color: #fff; border: none; border-radius: var(--r4); font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(232, 101, 10, 0.2); }
    .btn-reset { padding: 12px 20px; background: var(--s2); color: var(--t2); border: 1px solid var(--b2); border-radius: var(--r4); font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-reset:hover { background: var(--s3); border-color: var(--b1); }

    /* ── CHART CONTAINER ── */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .chart-container { position: relative; height: 300px; padding: 16px; background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r12); }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── TABLE ── */
    .table-wrapper { margin-top: 20px; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .table-header h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--t1); text-transform: uppercase; letter-spacing: 0.5px; }
    .table-scroll { overflow-x: auto; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    table col:nth-child(1) { width: 20%; }
    table col:nth-child(2) { width: 40%; }
    table col:nth-child(3) { width: 10%; }
    table col:nth-child(4) { width: 10%; }
    table col:nth-child(5) { width: 5%; }
    table col:nth-child(6) { width: 5%; }
    table col:nth-child(7) { width: 10%; }
    table col:nth-child(8) { width: 10%; }
    thead { background: var(--s2); border-bottom: 1px solid var(--b1); }
    thead th { padding: 12px; text-align: center; font-size: 12px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    thead th:first-child { text-align: left; }
    tbody td { padding: 12px; border-bottom: 1px solid var(--b1); font-size: 13px; color: var(--t1); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tbody td:first-child { text-align: left; }
    tbody td:nth-child(2) { text-align: left; white-space: normal; }
    tbody tr:hover { background: rgba(232, 101, 10, 0.02); }
    .addr-cell { font-size: 12px; color: var(--t3); line-height: 1.4; }
    .status-open { color: var(--gr); font-weight: 600; }
    .status-closed { color: var(--rd); font-weight: 600; }

    /* ── PAGINATION ── */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 16px; }
    .pagination button { padding: 8px 12px; border: 1px solid var(--b2); background: var(--s1); color: var(--t1); border-radius: var(--r4); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
    .pagination button:hover { border-color: var(--ac); color: var(--ac); }
    .pagination button.active { background: var(--ac); color: #fff; border-color: var(--ac); }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

    @media(max-width: 1024px) { .filter-row { grid-template-columns: 1fr 1fr; } .filter-date-range { grid-column: 1 / -1; } .chart-grid { grid-template-columns: 1fr; } }
    @media(max-width: 860px) { .hdr { flex-direction: column; align-items: flex-start; } .filter-row { grid-template-columns: 1fr; } }
    @media(max-width: 480px) { .wrap { padding: 20px 10px 60px; } .chart-container { height: 250px; } .filter-date-range { flex-direction: column; } }

    @media print {
      body { background: #fff; font-size: 11px; }
      .bg-glow, .hdr-btns, #toast, .filter-section, .button-group { display: none!important; }
      .wrap { padding: 16px; max-width: 100%; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
      .chart-container { height: 200px; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">

    <a href="../index.html" class="back-nav">← 홈으로 돌아가기</a>

    <!-- HEADER -->
    <div class="hdr fuv">
      <div>
        <h1 class="pg-title">외국인 도시 <span>민박업 현황</span><span class="ver-badge">v2 · 2026-05-03</span></h1>
        <p class="pg-sub">공공데이터 기반 전국 외국인 관광 도시 민박업 허가 업장 현황 조회</p>
      </div>
    </div>

    <!-- FILTER SECTION -->
    <div class="filter-section fuv d1">
      <div style="margin-bottom: 16px;">
        <h3 style="font-size: 14px; font-weight: 700; color: var(--t1); margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">조건 필터</h3>
      </div>

      <!-- Row 1: 시도, 시군구, 인허가일자 범위, 영업상태 -->
      <div class="filter-row">
        <div class="filter-group">
          <label>개방자치단체코드</label>
          <select id="sido_filter" onchange="updateSigunguFilter()"></select>
        </div>
        <div class="filter-group">
          <label>세부 지역</label>
          <select id="sigungu_filter">
            <option value="">전체</option>
          </select>
        </div>
        <div class="filter-date-range">
          <div class="filter-group">
            <label>인허가일자</label>
            <input type="date" id="permit_date_from">
          </div>
          <span>~</span>
          <div class="filter-group">
            <label></label>
            <input type="date" id="permit_date_to">
          </div>
        </div>
        <div class="filter-group">
          <label>영업상태명</label>
          <select id="status_filter">
            <option value="">전체</option>
            <option value="영업/정상">영업/정상</option>
            <option value="휴업">휴업</option>
            <option value="폐업">폐업</option>
            <option value="취소/말소/만료/정지/중지">취소/말소/만료/정지/중지</option>
            <option value="제외/삭제/전출">제외/삭제/전출</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <!-- Row 2: 사업장명, 조회 버튼 -->
      <div class="filter-row">
        <div style="grid-column: 1 / -1; display: flex; gap: 12px; align-items: flex-end;">
          <div class="filter-group" style="flex: 1;">
            <label>사업장명/주소</label>
            <input type="text" id="search_keyword" placeholder="예: 서울 스테이, 강남구">
          </div>
          <div class="button-group" style="margin: 0;">
            <button class="btn-search" onclick="searchData()">🔍 조회</button>
            <button class="btn-reset" onclick="resetFilters()">↺ 초기화</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CHART: 지역별 업장 분포 -->
    <div class="card fuv d2">
      <div class="card-hdr">
        <div class="card-ico" style="background: rgba(37, 99, 235, 0.1);">📊</div>
        <span class="card-ttl">지역별 업장 분포</span>
      </div>
      <div class="card-body">
        <div class="chart-grid">
          <div>
            <div class="chart-title">정상영업</div>
            <div class="chart-container">
              <canvas id="regionChartOpen"></canvas>
            </div>
          </div>
          <div>
            <div class="chart-title">폐업</div>
            <div class="chart-container">
              <canvas id="regionChartClosed"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TABLE: 숙소 목록 -->
    <div class="card fuv d3">
      <div class="card-hdr">
        <div class="card-ico" style="background: rgba(217, 119, 6, 0.1);">📋</div>
        <span class="card-ttl">숙소 목록</span>
        <span style="font-size: 12px; color: var(--t3); font-weight: 500; margin-left: auto;" id="table_count">0개</span>
      </div>
      <div class="card-body">
        <div class="table-scroll">
          <table>
            <colgroup>
              <col style="width: 20%;">
              <col style="width: 40%;">
              <col style="width: 8%;">
              <col style="width: 8%;">
              <col style="width: 10%;">
              <col style="width: 5%;">
              <col style="width: 5%;">
              <col style="width: 10%;">
              <col style="width: 10%;">
            </colgroup>
            <thead>
              <tr>
                <th>사업장명</th>
                <th>주소</th>
                <th>지역</th>
                <th>세부지역</th>
                <th>건물용도</th>
                <th>객실수</th>
                <th>규모(㎡)</th>
                <th>영업상태</th>
                <th>허가일</th>
              </tr>
            </thead>
            <tbody id="table_body"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    /* ═══════════ CONFIG ═══════════ */
    const DATA_FILE = '../data/homestay-data.json';

    let allData = [];
    let filteredData = [];
    let regionChartOpen = null;
    let regionChartClosed = null;

    // 페이징 관련
    const ITEMS_PER_PAGE = 20;
    let currentPage = 1;

    /* ═══════════ UTILS ═══════════ */
    function esc(str){
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function fmtN(n){
      return (n||0).toLocaleString('ko-KR');
    }

    function toast(msg){
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }

    /* ═══════════ FILTER INIT ═══════════ */
    function initFilters(){
      // 시도 필터 초기화
      const sidoSel = document.getElementById('sido_filter');
      getAllSidos().forEach(sido => {
        const opt = document.createElement('option');
        opt.value = sido.code;
        opt.textContent = sido.name;
        sidoSel.appendChild(opt);
      });
      sidoSel.value = '6110000_ALL'; // 서울 기본값
      updateSigunguFilter();

      // 영업상태 필터 기본값
      document.getElementById('status_filter').value = '영업/정상';
    }

    function updateSigunguFilter(){
      const sidoCode = document.getElementById('sido_filter').value;
      const sigunguSel = document.getElementById('sigungu_filter');
      sigunguSel.innerHTML = '<option value="">전체</option>';

      if(sidoCode) {
        const siggus = getSigunguList(sidoCode);
        siggus.forEach(sg => {
          const opt = document.createElement('option');
          opt.value = sg.name;
          opt.textContent = sg.name;
          sigunguSel.appendChild(opt);
        });
      }
    }

    /* ═══════════ DATA LOAD ═══════════ */
    async function loadDataFromFile(){
      try {
        const resp = await fetch(DATA_FILE);
        const json = await resp.json();
        allData = json.items || [];
        return true;
      } catch(e) {
        console.error(e);
        toast('데이터 로드 실패: ' + e.message);
        return false;
      }
    }

    /* ═══════════ FILTER (클라이언트 필터링) ═══════════ */
    function filterDataByConditions(filters){
      return allData.filter(item => {
        // 시도 필터 (필수)
        const itemSido = extractSidoFromAddress(item.ROAD_NM_ADDR || item.LOTNO_ADDR || '');
        const itemSidoCode = getSidoCode(itemSido);
        if(itemSidoCode !== filters.sidoCode) return false;

        // 시군구 필터
        if(filters.sigunguName) {
          const addr = item.ROAD_NM_ADDR || item.LOTNO_ADDR || '';
          const parts = addr.split(' ');
          const sigunguInAddr = parts[1] || '';
          if(sigunguInAddr !== filters.sigunguName) return false;
        }

        // 영업상태 필터 (필수)
        if(item.SALS_STTS_NM !== filters.statusName) return false;

        // 허가일자 범위
        if(filters.permitFrom && item.LCPMT_YMD < filters.permitFrom) return false;
        if(filters.permitTo && item.LCPMT_YMD > filters.permitTo) return false;

        // 검색어: 사업장명 또는 주소 부분일치
        if(filters.searchKeyword) {
          const searchLower = filters.searchKeyword.toLowerCase();
          const businessNameMatch = item.BPLC_NM.toLowerCase().includes(searchLower);
          const addressMatch = (item.ROAD_NM_ADDR || item.LOTNO_ADDR || '').toLowerCase().includes(searchLower);
          if(!businessNameMatch && !addressMatch) return false;
        }

        return true;
      });
    }

    /* ═══════════ SEARCH ═══════════ */
    async function searchData(){
      const sidoCode = document.getElementById('sido_filter').value;
      const statusName = document.getElementById('status_filter').value;
      const permitFrom = document.getElementById('permit_date_from').value;
      const permitTo = document.getElementById('permit_date_to').value;
      const searchKeyword = document.getElementById('search_keyword').value;

      // 필수 필터 검증
      if(!statusName) {
        toast('영업상태를 선택해주세요');
        return;
      }

      toast('필터링 중...');

      // 클라이언트 필터링
      const filters = {
        sidoCode: sidoCode,
        sigunguName: document.getElementById('sigungu_filter').value,
        statusName: statusName,
        permitFrom: permitFrom,
        permitTo: permitTo,
        searchKeyword: searchKeyword
      };

      filteredData = filterDataByConditions(filters);
      currentPage = 1;  // 페이지 초기화
      updateRegionChart(filters.sidoCode);
      renderTable();
      toast('검색 완료');
    }


    function resetFilters(){
      document.getElementById('sido_filter').value = '6110000_ALL';
      updateSigunguFilter();
      document.getElementById('sigungu_filter').value = '';
      document.getElementById('status_filter').value = '영업/정상';
      document.getElementById('permit_date_from').value = '';
      document.getElementById('permit_date_to').value = '';
      document.getElementById('search_keyword').value = '';
      filteredData = [];
      currentPage = 1;
      regionChartOpen?.destroy?.();
      regionChartClosed?.destroy?.();
      document.getElementById('table_body').innerHTML = '';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('table_count').textContent = '0개';
      toast('필터 초기화됨');
    }

    /* ═══════════ TABLE & PAGINATION ═══════════ */
    function renderTable(){
      const tbody = document.getElementById('table_body');
      tbody.innerHTML = '';

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageData = filteredData.slice(start, end);

      pageData.forEach(item => {
        const tr = document.createElement('tr');
        const statusCls = item.SALS_STTS_NM === '영업/정상' ? 'status-open' : 'status-closed';
        const statusDisplay = item.SALS_STTS_NM || '-';

        const addr = item.ROAD_NM_ADDR || item.LOTNO_ADDR || '';
        const sido = extractSidoFromAddress(addr);
        const parts = addr.split(' ');
        const sigungu = parts[1] || '-';
        const bldgUsg = (item.BLDG_USG_NM || '-').split('(')[0].trim();

        tr.innerHTML = `
          <td><strong>${esc(item.BPLC_NM)}</strong></td>
          <td class="addr-cell">${esc(addr)}</td>
          <td>${esc(sido || '-')}</td>
          <td>${esc(sigungu)}</td>
          <td>${esc(bldgUsg)}</td>
          <td>${fmtN(item.GSRM_CNT || '-')}</td>
          <td>${fmtN(item.FCLT_SCL || '-')}</td>
          <td class="${statusCls}">${statusDisplay}</td>
          <td>${item.LCPMT_YMD || '-'}</td>
        `;
        tbody.appendChild(tr);
      });

      updatePagination();
    }

    function updatePagination(){
      const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);
      const paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = '';

      // 이전 버튼
      const prevBtn = document.createElement('button');
      prevBtn.textContent = '< 이전';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = () => {
        if(currentPage > 1) {
          currentPage--;
          renderTable();
          window.scrollTo(0, 0);
        }
      };
      paginationEl.appendChild(prevBtn);

      // 페이지 번호
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      if(startPage > 1) {
        const firstBtn = document.createElement('button');
        firstBtn.textContent = '1';
        firstBtn.onclick = () => {
          currentPage = 1;
          renderTable();
          window.scrollTo(0, 0);
        };
        paginationEl.appendChild(firstBtn);

        if(startPage > 2) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.padding = '0 4px';
          paginationEl.appendChild(dots);
        }
      }

      for(let i = startPage; i <= endPage; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.textContent = i;
        pageBtn.classList.toggle('active', i === currentPage);
        pageBtn.onclick = () => {
          currentPage = i;
          renderTable();
          window.scrollTo(0, 0);
        };
        paginationEl.appendChild(pageBtn);
      }

      if(endPage < totalPages) {
        if(endPage < totalPages - 1) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.padding = '0 4px';
          paginationEl.appendChild(dots);
        }

        const lastBtn = document.createElement('button');
        lastBtn.textContent = totalPages;
        lastBtn.onclick = () => {
          currentPage = totalPages;
          renderTable();
          window.scrollTo(0, 0);
        };
        paginationEl.appendChild(lastBtn);
      }

      // 다음 버튼
      const nextBtn = document.createElement('button');
      nextBtn.textContent = '다음 >';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = () => {
        if(currentPage < totalPages) {
          currentPage++;
          renderTable();
          window.scrollTo(0, 0);
        }
      };
      paginationEl.appendChild(nextBtn);

      // 개수 표시
      document.getElementById('table_count').textContent = `${filteredData.length}개`;
    }

    /* ═══════════ CHART ═══════════ */
    function updateRegionChart(sidoCode){
      // 선택된 시도 내의 전체 데이터 필터링
      const sidoData = allData.filter(item => {
        const itemSido = extractSidoFromAddress(item.ROAD_NM_ADDR || item.LOTNO_ADDR || '');
        const itemSidoCode = getSidoCode(itemSido);
        return itemSidoCode === sidoCode;
      });

      // 정상영업 데이터 추출
      const openData = sidoData.filter(item => item.SALS_STTS_NM === '영업/정상');
      // 폐업 데이터 추출
      const closedData = sidoData.filter(item => item.SALS_STTS_NM === '폐업');

      // 각각 시군구별로 분류
      const getDistributionMap = (data) => {
        const map = {};
        data.forEach(item => {
          const addr = item.ROAD_NM_ADDR || item.LOTNO_ADDR || '';
          const parts = addr.split(' ');
          const sigungu = parts[1] || '알수없음';
          map[sigungu] = (map[sigungu] || 0) + 1;
        });
        return map;
      };

      const openMap = getDistributionMap(openData);
      const closedMap = getDistributionMap(closedData);

      // 모든 지역명 수집 후 정렬 (합계 기준)
      const allLabels = new Set([...Object.keys(openMap), ...Object.keys(closedMap)]);
      const labels = Array.from(allLabels).sort((a, b) =>
        (closedMap[b] || 0 + openMap[b] || 0) - (closedMap[a] || 0 + openMap[a] || 0)
      );
      const openChartData = labels.map(l => openMap[l] || 0);
      const closedChartData = labels.map(l => closedMap[l] || 0);

      // 정상영업 차트
      const ctxOpen = document.getElementById('regionChartOpen');
      if(regionChartOpen) regionChartOpen.destroy();
      regionChartOpen = new Chart(ctxOpen, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '정상영업',
            data: openChartData,
            backgroundColor: 'rgba(22, 163, 74, 0.7)',
            borderColor: '#16a34a',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });

      // 폐업 차트
      const ctxClosed = document.getElementById('regionChartClosed');
      if(regionChartClosed) regionChartClosed.destroy();
      regionChartClosed = new Chart(ctxClosed, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: '폐업',
            data: closedChartData,
            backgroundColor: 'rgba(220, 38, 38, 0.7)',
            borderColor: '#dc2626',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });
    }

    /* ═══════════ INIT ═══════════ */
    window.addEventListener('DOMContentLoaded', async () => {
      initFilters();

      // JSON 파일에서 데이터 로드
      toast('데이터 로드 중...');
      const loaded = await loadDataFromFile();

      if(loaded) {
        // 페이지 로드 시 기본값(서울 + 영업정상)으로 필터링
        const filters = {
          sidoCode: '6110000_ALL',  // 서울특별시 전체
          sigunguName: '',          // 전체
          statusName: '영업/정상',  // 영업/정상
          permitFrom: '',
          permitTo: '',
          businessName: ''
        };

        const initialFilters = {
          sidoCode: '6110000_ALL',  // 서울특별시 전체
          sigunguName: '',          // 전체
          statusName: '영업/정상',  // 영업/정상
          permitFrom: '',
          permitTo: '',
          searchKeyword: ''
        };

        filteredData = filterDataByConditions(initialFilters);
        currentPage = 1;
        updateRegionChart('6110000_ALL');
        renderTable();
        toast('준비 완료');
      }
    });
  </script>
