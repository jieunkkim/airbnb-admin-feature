<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>침구 견적 계산기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#faf8f5; --s1:#ffffff; --s2:#f5f2ee; --s3:#ede8e0; --s4:#e4ddd2;
  --b1:rgba(0,0,0,0.07); --b2:rgba(0,0,0,0.11); --b3:rgba(0,0,0,0.17);
  --t1:#1c1612; --t2:#6b5e52; --t3:#a8998c;
  --ac:#e8650a; --ac2:#f07820; --acg:rgba(232,101,10,0.13);
  --gr:#16a34a; --grd:rgba(22,163,74,0.09);
  --rd:#dc2626; --rdd:rgba(220,38,38,0.09);
  --am:#d97706; --amd:rgba(217,119,6,0.10);
  --bl:#2563eb; --bld:rgba(37,99,235,0.09);
  --r4:8px; --r8:12px; --r12:16px; --r16:20px; --r24:28px;
}

html{scroll-behavior:smooth}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--t1);
  min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6;font-size:16px}

.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-glow::before{content:'';position:absolute;top:-25%;left:-15%;width:70vw;height:70vw;
  background:radial-gradient(circle,rgba(232,101,10,.08) 0%,transparent 60%);
  animation:dft1 20s ease-in-out infinite alternate}
.bg-glow::after{content:'';position:absolute;bottom:-20%;right:-10%;width:55vw;height:55vw;
  background:radial-gradient(circle,rgba(217,119,6,.06) 0%,transparent 60%);
  animation:dft2 25s ease-in-out infinite alternate}
@keyframes dft1{from{transform:translate(0,0)}to{transform:translate(5%,7%)}}
@keyframes dft2{from{transform:translate(0,0)}to{transform:translate(-6%,-5%)}}

.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 22px 90px}

/* ── HEADER ── */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px}
.pg-title{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:800;letter-spacing:-1.2px;line-height:1.15}
.pg-title span{background:linear-gradient(135deg,var(--ac),var(--am));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pg-sub{margin-top:7px;font-size:14px;color:var(--t2)}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.notion-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:#fff;border:1px solid var(--b2);border-radius:var(--r8);font-size:14px;font-weight:600;color:var(--t1);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.notion-btn:hover{background:var(--s3);border-color:var(--b3);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.notion-btn.primary{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;box-shadow:0 3px 14px var(--acg)}
.notion-btn.primary:hover{box-shadow:0 6px 24px rgba(232,101,10,.3);transform:translateY(-1px)}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card+.card{margin-top:16px}
.card-hdr{padding:20px 22px 0;display:flex;align-items:center;gap:10px}
.card-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-ttl{font-size:14px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t2)}
.card-body{padding:16px 22px 22px}

/* ── INPUT GRID ── */
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px 18px}
.ig-field{display:flex;flex-direction:column;gap:5px}
.ig-field label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3)}
.ig-field input,.ig-field select{
  background:#fff;border:1px solid var(--b2);border-radius:var(--r4);color:var(--t1);
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;padding:10px 14px;outline:none;
  transition:border-color .15s,box-shadow .15s}
.ig-field input:focus,.ig-field select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.ig-field input[type=number]{-moz-appearance:textfield;text-align:center}
.ig-field input[type=number]::-webkit-outer-spin-button,
.ig-field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

.derived-val{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:#fff;border:1px solid var(--b2);border-radius:var(--r4);min-height:44px;transition:border-color .15s,box-shadow .15s}
.derived-val:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.derived-val input{border:none;background:transparent;font-size:16px;font-weight:800;
  color:var(--ac);width:50px;text-align:center;outline:none;padding:0;font-family:'DM Sans',sans-serif;
  -moz-appearance:textfield}
.derived-val input::-webkit-outer-spin-button,.derived-val input::-webkit-inner-spin-button{-webkit-appearance:none}
.derived-val .dv-unit{font-size:13px;color:var(--t3);font-weight:500}
.override-badge{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  background:var(--amd);color:var(--am);border-radius:999px;padding:2px 7px;white-space:nowrap}

.bed-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;grid-column:1/-1}
.bed-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  background:var(--s2);border:1px solid var(--b1);border-radius:999px;font-size:13px;font-weight:600;color:var(--t2)}
.bed-chip b{color:var(--ac)}

/* ── TABLE ── */
.tbl-scroll{overflow-x:auto;margin:0 -22px;padding:0 22px}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:720px}
thead th{padding:12px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--t3);background:var(--s2);border-bottom:1.5px solid var(--b2);white-space:nowrap}
thead th:first-child{text-align:center;width:42px;padding-left:14px}
thead th:nth-child(2){text-align:left;min-width:180px}
tbody tr{border-bottom:1px solid var(--b1);transition:background .15s}
tbody tr:hover{background:rgba(232,101,10,.03)}
tbody tr.hidden-row{display:none}
tbody td{padding:4px 4px;text-align:center;vertical-align:middle}
tbody td:first-child{color:var(--t3);font-size:13px;font-weight:600;width:42px;padding-left:14px}
tbody td:nth-child(2){text-align:left}

.size-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.size-badge.q{background:rgba(232,101,10,.1);color:var(--ac)}
.size-badge.ss{background:var(--bld);color:var(--bl)}
.size-badge.common{background:var(--s3);color:var(--t2)}

.tbl-input{width:100%;border:1px solid transparent;padding:9px 8px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;color:var(--t1);background:transparent;border-radius:var(--r4);
  transition:all .15s;outline:none}
.tbl-input:focus{border-color:var(--ac);background:rgba(232,101,10,.04);box-shadow:0 0 0 2px var(--acg)}
.tbl-input.num{text-align:right;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
.tbl-input.num::-webkit-outer-spin-button,.tbl-input.num::-webkit-inner-spin-button{-webkit-appearance:none}
.tbl-input.center{text-align:center}

.qty-cell{font-weight:700;font-size:14px;color:var(--ac2);font-variant-numeric:tabular-nums;white-space:nowrap}
.amt-cell{font-weight:700;font-size:14px;color:var(--t1);white-space:nowrap;font-variant-numeric:tabular-nums;padding-right:12px!important;text-align:right!important}

.del-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:6px;
  border-radius:50%;transition:all .15s;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center}
.del-btn:hover{background:var(--rdd);color:var(--rd)}

.add-area{padding:12px 22px;border-top:1px dashed var(--b1)}
.add-btn{width:100%;padding:10px;border:1px dashed rgba(232,101,10,.3);border-radius:var(--r8);
  background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:var(--ac2);cursor:pointer;transition:all .2s}
.add-btn:hover{background:rgba(232,101,10,.06);border-color:var(--ac)}

/* ── TABLE BOTTOM ── */

.total-row{display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(232,101,10,.08),rgba(217,119,6,.06));
  border:1px solid rgba(232,101,10,.2);border-radius:var(--r12);padding:20px 24px;margin-top:20px}
.total-label{font-size:15px;font-weight:700;color:var(--t1)}
.total-val{font-size:28px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--ac),var(--am));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.notes-area textarea{width:100%;border:1px solid var(--b1);border-radius:var(--r8);padding:14px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--t1);resize:vertical;min-height:70px;
  transition:border-color .15s;outline:none;background:var(--s2);line-height:1.7}
.notes-area textarea:focus{border-color:var(--ac);background:#fff}

#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);
  background:#fff;border:1px solid var(--b2);border-radius:var(--r8);box-shadow:0 8px 36px rgba(0,0,0,.15);
  padding:11px 20px;font-size:14px;font-weight:600;color:var(--t1);z-index:9999;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s;opacity:0;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes fuv{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fuv{animation:fuv .42s ease both}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.16s}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:999px}

@media print{
  body{background:#fff;font-size:12px}
  .bg-glow,.hdr-btns,.del-btn,.add-area,#toast{display:none!important}
  .wrap{padding:16px;max-width:100%}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  .tbl-input,.notes-area textarea{border:none!important;padding:4px;background:transparent!important;box-shadow:none!important}
  .total-row{background:none;border:2px solid #e8650a}
  table{min-width:0}.disc-row{background:transparent}
}
@media(max-width:860px){.hdr{flex-direction:column;align-items:flex-start}}
@media(max-width:480px){.wrap{padding:20px 10px 60px}.kpi-val{font-size:18px}.total-val{font-size:22px}.input-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">

<!-- HEADER -->
<div class="hdr fuv">
  <div>
    <h1 class="pg-title">침구 <span>견적 계산기</span></h1>
    <p class="pg-sub">침대 수와 인원을 입력하면 품목별 수량이 자동 계산됩니다</p>
    <div style="margin-top:10px;display:inline-flex;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r8);padding:8px 14px;font-size:12px;color:#c97a3a;line-height:1.7">
      본 견적서는 참고용이며, 실제 거래 시 변동될 수 있습니다. 무단 복제 및 배포를 금합니다. © 2026 에이치런(h.run) All rights reserved.
    </div>
  </div>
  <div class="hdr-btns">
    <button class="notion-btn" onclick="resetAll()">↺ 초기화</button>
    <button class="notion-btn" onclick="copyMarkdown()">📋 견적 복사 (Markdown)</button>
    <button class="notion-btn primary" onclick="window.print()">🖨️ 견적 인쇄</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="card fuv d1">
  <div class="card-hdr">
    <div class="card-ico" style="background:rgba(232,101,10,.1)">🏷️</div>
    <span class="card-ttl">견적 설정</span>
  </div>
  <div class="card-body">
    <div class="input-grid">
      <div class="ig-field" style="grid-column:span 2">
        <label>견적명</label>
        <input type="text" id="quote_name" value="에이치런견적" placeholder="예: 퀸세트">
      </div>
      <div class="ig-field">
        <label>견적일</label>
        <input type="date" id="quote_date">
      </div>
      <div class="ig-field">
        <label>Q 침대 수</label>
        <input type="number" id="bed_q" value="0" min="0" max="99" onchange="onBedChange()" oninput="onBedChange()">
      </div>
      <div class="ig-field">
        <label>SS 침대 수</label>
        <input type="number" id="bed_ss" value="0" min="0" max="99" onchange="onBedChange()" oninput="onBedChange()">
      </div>
      <div class="ig-field">
        <label>최대 인원 수</label>
        <div class="derived-val">
          <input type="number" id="max_person" min="0" max="999" onchange="onPersonChange()" oninput="onPersonChange()">
          <span class="dv-unit">명</span>
          <span class="override-badge" id="override_badge" style="display:none">수동</span>
        </div>
      </div>
      <div class="bed-chips" id="bed_chips"></div>
    </div>
  </div>
</div>

<!-- ITEMS TABLE -->
<div class="card fuv d2" style="margin-top:16px">
  <div class="card-hdr">
    <div class="card-ico" style="background:rgba(217,119,6,.1)">🛏️</div>
    <span class="card-ttl">품목 목록</span>
    <span style="margin-left:auto;font-size:12px;color:var(--t3);font-weight:500" id="item_count">0개</span>
  </div>
  <div class="card-body" style="padding-bottom:0">
    <div class="tbl-scroll">
      <table>
        <thead><tr>
          <th>No</th><th>품목</th><th>사이즈</th><th>수량</th><th>단가 (원)</th><th>금액 (원)</th><th>비고</th><th style="width:36px"></th>
        </tr></thead>
        <tbody id="items_body"></tbody>
      </table>
    </div>
  </div>
  <div class="add-area">
    <button class="add-btn" onclick="addCustomRow()">+ 품목 추가</button>
  </div>
</div>

<div class="total-row fuv d3">
  <div class="total-label">최종 견적 금액</div>
  <div class="total-val" id="final_total">₩0</div>
</div>

<!-- NOTES -->
<div class="card fuv d3" style="margin-top:16px">
  <div class="card-hdr">
    <div class="card-ico" style="background:rgba(37,99,235,.1)">📝</div>
    <span class="card-ttl">비고 / 특이사항</span>
  </div>
  <div class="card-body"><div class="notes-area">
    <textarea id="notes" placeholder="납기일, 배송 조건, 특수 요청 사항 등을 입력하세요..."></textarea>
  </div></div>
</div>

</div>
<div id="toast"></div>

<script>
/* ═══════════ CONFIG ═══════════ */
const SIZES = {
  Q:  { mattress:'150*200', blanket:'200*230', personPer:2 },
  SS: { mattress:'110*200', blanket:'160*210', personPer:1 },
};

const TEMPLATES = [
  // bed-type: one row per bed size, qty = beds × multi
  { key:'cover',  name:'매트리스 커버 방수', type:'bed', multi:1, sizeField:'mattress', priceQ:20000, priceSS:20000 },
  { key:'sheet',  name:'매트리스 시트',     type:'bed', multi:3, sizeField:'mattress', priceQ:17000, priceSS:16000 },
  { key:'blanket',name:'이불솜',           type:'bed', multi:1, sizeField:'blanket',  priceQ:63000, priceSS:55000 },
  { key:'bcover', name:'이불커버',         type:'bed', multi:3, sizeField:'blanket',  priceQ:27000, priceSS:26000 },
  // person-type: qty = maxPerson × multi
  { key:'pillow', name:'베개솜',            type:'person', multi:1, size:'50*70',  price:12000 },
  { key:'pwcover',name:'베개 매쉬 방수커버', type:'person', multi:1, size:'50*70',  price:4500 },
  { key:'pcover', name:'캥거루 베개커버',    type:'person', multi:3, size:'50*70',  price:3200 },
  { key:'ftowel', name:'세면타올',          type:'person', multi:6, size:'40*80',  price:2200, note:'130g' },
  { key:'btowel', name:'바스타올',          type:'person', multi:3, size:'65*130', price:6500, note:'430g' },
];

let items = [];
let uid = 0;
let personOverride = false;

/* ═══════════ INIT ═══════════ */
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('quote_date').value = new Date().toISOString().split('T')[0];
  buildItems();
  recalc();
});

/* ═══════════ BUILD ═══════════ */
function buildItems(){
  items = []; uid = 0;
  document.getElementById('items_body').innerHTML = '';

  const bedTmpls = TEMPLATES.filter(t => t.type==='bed');
  const perTmpls = TEMPLATES.filter(t => t.type==='person');

  // Q rows
  bedTmpls.forEach(t => pushRow({ ...t, bedSize:'Q', note: t.note||'Q' }));
  // SS rows
  bedTmpls.forEach(t => pushRow({ ...t, bedSize:'SS', note: t.note||'SS' }));
  // Person rows
  perTmpls.forEach(t => pushRow({ ...t, bedSize:null, note: t.note||'' }));
}

function pushRow(cfg){
  const id = ++uid;
  const sizeStr = cfg.bedSize ? SIZES[cfg.bedSize][cfg.sizeField] : (cfg.size||'');
  const price = cfg.bedSize ? (cfg.bedSize==='Q' ? cfg.priceQ : cfg.priceSS) : (cfg.price||0);
  const item = { id, key:cfg.key, name:cfg.name, type:cfg.type, bedSize:cfg.bedSize||null,
    multi:cfg.multi, sizeField:cfg.sizeField||null, size:sizeStr, price:price,
    note:cfg.note||'', custom:false };
  items.push(item);
  renderRow(item);
}

function addCustomRow(){
  const id = ++uid;
  const item = { id, key:'custom_'+id, name:'', type:'custom', bedSize:null,
    multi:1, sizeField:null, size:'', price:0, note:'', custom:true, customQty:0 };
  items.push(item);
  renderRow(item);
  recalc();
  const el = document.querySelector(`#row_${id} .name-input`);
  if(el) el.focus();
}

function getFormula(item){
  if(item.custom) return '';
  if(item.type==='bed'){
    const sizeLabel = item.bedSize==='Q'?'Q침대':'SS침대';
    return item.multi===1 ? `${sizeLabel} 수 × 1` : `${sizeLabel} 수 × ${item.multi}`;
  }
  if(item.type==='person'){
    return item.multi===1 ? '최대인원 × 1' : `최대인원 × ${item.multi}`;
  }
  return '';
}

function renderRow(item){
  const tbody = document.getElementById('items_body');
  const tr = document.createElement('tr');
  tr.id = 'row_' + item.id;
  if(item.bedSize) tr.dataset.bedSize = item.bedSize;

  const bCls = item.bedSize==='Q'?'q':item.bedSize==='SS'?'ss':'common';
  const bTxt = item.bedSize||(item.type==='person'?'공통':'');
  const badge = bTxt ? `<span class="size-badge ${bCls}">${bTxt}</span>` : '';
  const formula = getFormula(item);
  const formulaHtml = formula ? `<div style="font-size:11px;color:var(--t3);font-weight:400;margin-top:2px">${formula}</div>` : '';

  const c = item.custom;

  tr.innerHTML = `
    <td class="row-no"></td>
    <td>${c
      ? `<input class="tbl-input name-input" type="text" value="${esc(item.name)}" placeholder="품목명" onchange="upd(${item.id},'name',this.value)">`
      : `<div><span style="font-weight:600;font-size:14px">${esc(item.name)}</span>${badge}${formulaHtml}</div>`}</td>
    <td>${c
      ? `<input class="tbl-input center" type="text" value="" placeholder="사이즈" style="width:90px" onchange="upd(${item.id},'size',this.value)">`
      : `<span style="font-size:13px;color:var(--t2)">${esc(item.size)}</span>`}</td>
    <td class="qty-cell" id="qty_${item.id}">${c
      ? `<input class="tbl-input num" type="number" value="0" min="0" style="width:60px" oninput="upd(${item.id},'customQty',+this.value);recalc()">`
      : '0'}</td>
    <td><input class="tbl-input num" type="text" value="${fmtN(item.price)}" style="width:100px"
      oninput="priceIn(this,${item.id})" onblur="priceOut(this,${item.id})"></td>
    <td class="amt-cell" id="amt_${item.id}">0</td>
    <td><input class="tbl-input center" type="text" value="${esc(item.note)}" style="width:70px"
      onchange="upd(${item.id},'note',this.value)"></td>
    <td><button class="del-btn" onclick="delRow(${item.id})" title="삭제">✕</button></td>`;
  tbody.appendChild(tr);
}

/* ═══════════ HELPERS ═══════════ */
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function fmtN(n){return n?(+n).toLocaleString('ko-KR'):'0'}
function upd(id,k,v){const it=items.find(i=>i.id===id);if(it)it[k]=v}
function priceIn(el,id){const r=el.value.replace(/,/g,'').replace(/[^0-9]/g,'');upd(id,'price',+r);recalc()}
function priceOut(el,id){const r=el.value.replace(/,/g,'').replace(/[^0-9]/g,'');el.value=fmtN(+r);upd(id,'price',+r);recalc()}
function delRow(id){items=items.filter(i=>i.id!==id);document.getElementById('row_'+id)?.remove();renumber();recalc()}

function renumber(){
  let n=0;
  document.querySelectorAll('#items_body tr').forEach(tr=>{
    if(tr.classList.contains('hidden-row'))return;
    const c=tr.querySelector('.row-no');if(c)c.textContent=++n;
  });
  const vis=items.filter(i=>{const t=document.getElementById('row_'+i.id);return t&&!t.classList.contains('hidden-row')});
  document.getElementById('item_count').textContent=vis.length+'개 품목';
}

/* ═══════════ BED / PERSON ═══════════ */
function bedQ(){return Math.max(0,+document.getElementById('bed_q').value||0)}
function bedSS(){return Math.max(0,+document.getElementById('bed_ss').value||0)}
function calcPerson(){return bedQ()*SIZES.Q.personPer+bedSS()*SIZES.SS.personPer}
function maxP(){return Math.max(0,+document.getElementById('max_person').value||0)}

function onBedChange(){
  if(!personOverride) document.getElementById('max_person').value=calcPerson();
  recalc();
}
function onPersonChange(){
  const c=calcPerson(),v=maxP();
  personOverride=(v!==c);
  document.getElementById('override_badge').style.display=personOverride?'':'none';
  recalc();
}

/* ═══════════ RECALC ═══════════ */
function recalc(){
  const bQ=bedQ(), bSS=bedSS(), mp=maxP(), totalBeds=bQ+bSS;

  // Chips
  const ch=[];
  if(bQ>0)ch.push(`<div class="bed-chip">Q 침대 <b>${bQ}</b>대 → <b>${bQ*2}</b>명</div>`);
  if(bSS>0)ch.push(`<div class="bed-chip">SS 침대 <b>${bSS}</b>대 → <b>${bSS}</b>명</div>`);
  ch.push(`<div class="bed-chip">최대 인원 <b>${mp}</b>명</div>`);
  document.getElementById('bed_chips').innerHTML=ch.join('');

  let subtotal=0, totalQty=0;

  items.forEach(item=>{
    let qty=0;
    const tr=document.getElementById('row_'+item.id);
    if(!tr)return;

    if(item.type==='bed'){
      const beds=item.bedSize==='Q'?bQ:bSS;
      qty=beds*item.multi;
      tr.classList.toggle('hidden-row', item.bedSize==='SS'&&bSS===0);
      if(!item.custom){const el=document.getElementById('qty_'+item.id);if(el)el.textContent=fmtN(qty)}
    } else if(item.type==='person'){
      qty=mp*item.multi;
      tr.classList.remove('hidden-row');
      if(!item.custom){const el=document.getElementById('qty_'+item.id);if(el)el.textContent=fmtN(qty)}
    } else {
      qty=item.customQty||0;
      tr.classList.remove('hidden-row');
    }

    const amt=qty*(item.price||0);
    if(!tr.classList.contains('hidden-row')){subtotal+=amt;totalQty+=qty}
    const ae=document.getElementById('amt_'+item.id);if(ae)ae.textContent=fmtN(amt);
  });

  renumber();

  document.getElementById('final_total').textContent='₩'+fmtN(subtotal);
}

/* ═══════════ RESET ═══════════ */
function resetAll(){
  document.getElementById('bed_q').value=0;
  document.getElementById('bed_ss').value=0;
  document.getElementById('quote_name').value='에이치런견적';
  document.getElementById('notes').value='';
  personOverride=false;
  document.getElementById('override_badge').style.display='none';
  document.getElementById('max_person').value=calcPerson();
  buildItems();recalc();toast('↺ 초기화 완료');
}

/* ═══════════ MARKDOWN COPY ═══════════ */
function copyMarkdown(){
  const bQ=bedQ(),bSS=bedSS(),mp=maxP();
  const name=document.getElementById('quote_name').value||'견적';
  const date=document.getElementById('quote_date').value;
  const notes=document.getElementById('notes').value;

  let md=`# 🛏️ ${name}\n`;
  md+=`> 견적일: ${date} | Q침대: ${bQ}대 | SS침대: ${bSS}대 | 최대인원: ${mp}명\n\n`;
  md+=`| No | 품목 | 사이즈 | 수량 | 단가 | 금액 | 비고 |\n`;
  md+=`|---:|------|--------|-----:|-----:|-----:|------|\n`;

  let n=0, total=0;
  items.forEach(item=>{
    const tr=document.getElementById('row_'+item.id);
    if(!tr||tr.classList.contains('hidden-row'))return;
    n++;
    let qty=0;
    if(item.type==='bed')qty=(item.bedSize==='Q'?bQ:bSS)*item.multi;
    else if(item.type==='person')qty=mp*item.multi;
    else qty=item.customQty||0;
    const amt=qty*(item.price||0);
    total+=amt;
    const dn=item.bedSize?`${item.name} (${item.bedSize})`:item.name;
    md+=`| ${n} | ${dn} | ${item.size} | ${fmtN(qty)} | ${fmtN(item.price)} | ${fmtN(amt)} | ${item.note||''} |\n`;
  });

  md+=`\n**최종 견적 금액: ₩${fmtN(total)}**\n`;
  if(notes) md+=`\n---\n📝 ${notes}\n`;

  navigator.clipboard.writeText(md)
    .then(()=>toast('✅ 마크다운 복사 완료'))
    .catch(()=>toast('⚠️ 복사 실패 — 직접 선택해 복사해주세요'));
}

/* ═══════════ TOAST ═══════════ */
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800)}
</script>
